##Auto matic installation of the TPM plugin manager for tmux
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g mode-keys vi
#set -g @plugin "arcticicestudio/nord-tmux"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# ---------------------------------------------------------------------
# HPC-safe status bar + active pane highlighting
# Put this BEFORE: run '~/.tmux/plugins/tpm/tpm'
# ---------------------------------------------------------------------

# Safer than tmux-256color on older clusters
set -g default-terminal "screen-256color"

# Status bar
set -g status on
set -g status-position bottom
set -g status-interval 10
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 100

# Use named 256-color / basic-safe colors instead of hex
set -g status-style "fg=colour250,bg=colour235"

# No Powerline/Nerd Font glyphs
set -g status-left "#[fg=black,bg=colour110,bold] #S #[fg=colour250,bg=colour235] | "

setw -g window-status-separator " "
setw -g window-status-format "#[fg=colour245,bg=colour235] #I:#W "
setw -g window-status-current-format "#[fg=black,bg=colour180,bold] #I:#W #[fg=colour250,bg=colour235]"

set -g status-right "#[fg=colour245,bg=colour235] #{pane_current_command} | #h | %Y-%m-%d %H:%M "

# Message / copy-mode styles
set -g message-style "fg=colour250,bg=colour238"
set -g message-command-style "fg=colour250,bg=colour238"
set -g mode-style "fg=black,bg=colour110,bold"

# Pane borders: this is the important part
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour110,bold"

# Pane title on border
set -g pane-border-status top
set -g pane-border-format " #P: #{pane_current_command} "
run '~/.tmux/plugins/tpm/tpm'
